<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer Profile | Soulamore</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="icon" href="../assets/images/favicon_symbol.png" type="image/x-icon">
    <style>
        :root {
            --primary: #0f172a;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --text-secondary: #4ECDC4;
            --text-primary: #f0fafa;
            --gold-star: #f59e0b;
            --border-light: #e2e8f0;
            --deep-space: #0f172a;
        }
        * { box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--primary); margin:0; }
        .container { max-width:700px; margin:0 auto; padding:0 20px; }

        .fade-in { animation:fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

        .back-link {
            display:inline-flex; align-items:center; gap:8px;
            color:var(--text-secondary); text-decoration:none;
            font-size:0.9rem; padding:12px 0; opacity:0.8;
        }
        .back-link:hover { opacity:1; }

        .soul-card {
            background:var(--card-bg); border-radius:16px;
            padding:24px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08);
        }

        .profile-header { display:flex; align-items:center; gap:20px; }
        .profile-avatar {
            width:72px; height:72px; border-radius:50%;
            background:linear-gradient(135deg, #4ECDC4, #2a9d8f);
            display:flex; align-items:center; justify-content:center;
            font-size:1.8rem; font-weight:700; color:white;
            flex-shrink:0; overflow:hidden;
        }
        .profile-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
        .profile-name { font-size:1.5rem; font-weight:700; color:var(--text-dark); margin-bottom:4px; }
        .profile-role { color:var(--text-muted); font-size:0.9rem; }
        .verified-badge {
            display:inline-flex; align-items:center; gap:6px;
            padding:3px 10px; border-radius:50px; font-size:0.78rem;
            background:rgba(78,205,196,0.1); color:var(--text-secondary);
            border:1px solid rgba(78,205,196,0.3); font-weight:600; margin-top:6px;
        }

        .section-title {
            font-size:1.1rem; font-weight:700; color:var(--text-dark); margin-bottom:12px;
        }

        /* TAGS */
        .exp-tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
        .exp-tag {
            padding:4px 14px; border-radius:50px; font-size:0.8rem; font-weight:600;
            background:rgba(78,205,196,0.1); color:var(--text-secondary);
            border:1px solid rgba(78,205,196,0.2);
        }

        /* AVAIL */
        .avail-pill {
            display:inline-flex; align-items:center; gap:8px;
            padding:6px 16px; border-radius:50px; font-size:0.82rem; font-weight:600;
        }
        .avail-pill.available { background:rgba(34,197,94,0.1); color:#22c55e; border:1px solid rgba(34,197,94,0.3); }
        .avail-pill.busy { background:rgba(245,158,11,0.1); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }

        /* REVIEWS */
        .reviews-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .write-review-box {
            background:#f8fafc; border-radius:12px; padding:20px; margin-bottom:20px;
        }
        .review-input {
            width:100%; padding:10px 14px; border:1px solid var(--border-light);
            border-radius:8px; font-family:'Plus Jakarta Sans',sans-serif;
            font-size:0.9rem; outline:none; margin-bottom:12px; background:white;
        }
        .review-input:focus { border-color:var(--text-secondary); }
        .star-rating { font-size:1.5rem; color:#cbd5e1; margin-bottom:12px; cursor:pointer; }
        .star-rating i:hover, .star-rating i.lit { color:var(--gold-star); }
        .btn-publish {
            background:var(--text-dark); color:white; border:none;
            padding:10px 24px; border-radius:8px; cursor:pointer; font-weight:600; float:right;
        }
        .btn-publish:hover { background:#334155; }
        .review-item { padding:18px 0; border-bottom:1px solid var(--border-light); }
        .review-item:last-child { border-bottom:none; }

        /* BOUNDARY CARD */
        .boundary-note {
            background:var(--text-primary); padding:18px 20px;
            border-left:4px solid var(--text-secondary);
            border-radius:0 10px 10px 0; color:var(--text-muted);
            font-style:italic; font-size:0.88rem; line-height:1.6;
        }

        /* FAB */
        .book-fab {
            position:fixed; bottom:28px; right:24px;
            background:#0f172a; color:white;
            padding:14px 28px; border-radius:50px; font-weight:700;
            text-decoration:none; box-shadow:0 8px 24px rgba(15,23,42,0.3);
            transition:0.3s; z-index:100; display:flex; align-items:center; gap:10px;
        }
        .book-fab:hover { transform:translateY(-4px); }

        /* LOADING / ERROR */
        .loading-state { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.4); }
        .loading-state i { font-size:2rem; margin-bottom:14px; display:block; color:#4ECDC4; }

        @media(max-width:600px) {
            .profile-header { flex-direction:column; text-align:center; }
        }
    </style>
</head>
<body>

<!-- APP SHELL -->
<div id="app-shell">
    <div id="shell-fixed">
        <header id="main-header"></header>
    </div>
    <main id="shell-content">
        <div class="container fade-in">
            <a href="../peers/peer_listing.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Peers</a>

            <div id="loadingState" class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                Loading profile...
            </div>

            <div id="errorState" style="display:none;" class="loading-state">
                <i class="fas fa-user-slash"></i>
                Profile not found or not yet available.
                <div style="margin-top:16px;"><a href="../peers/peer_listing.html" class="back-link">← Browse Peers</a></div>
            </div>

            <div id="profileContent" style="display:none;"></div>
        </div>
    </main>
    <footer></footer>
</div>

<script src="../assets/js/components.js"></script>
<script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDxHa9CR8OVpDn9MObPCzbnsYTCWcTb-9k",
        authDomain: "soulamore-f0a64.firebaseapp.com",
        projectId: "soulamore-f0a64",
        storageBucket: "soulamore-f0a64.firebasestorage.app",
        messagingSenderId: "649985161002",
        appId: "1:649985161002:web:66141929d4acd4451a5053"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentPeerId = null;
    let currentRating = 0;

    function escapeHTML(str) {
        return String(str || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }

    async function loadProfile() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) { showError(); return; }
        currentPeerId = id;

        try {
            const snap = await getDoc(doc(db, 'peers', id));
            if (!snap.exists() || !snap.data().is_published) { showError(); return; }
            renderProfile(snap.data());
        } catch(e) {
            console.error(e); showError();
        }
    }

    function renderProfile(d) {
        document.title = `${d.full_name || 'Peer'} | Soulamore`;

        const avatarContent = d.avatar_url
            ? `<img src="${escapeHTML(d.avatar_url)}" alt="${escapeHTML(d.full_name)}">`
            : escapeHTML(d.avatar_initial || (d.full_name || 'A').charAt(0).toUpperCase());

        const availClass = (d.availability_status === 'Available Now') ? 'available' : 'busy';
        const availIcon = availClass === 'available' ? 'fa-circle' : 'fa-clock';

        const expTags = (d.lived_experiences || []).map(t => `<span class="exp-tag">${escapeHTML(t)}</span>`).join('');

        const bioParagraphs = (d.bio_paragraphs || []).map(p =>
            `<p style="margin-bottom:12px; color:var(--text-muted); line-height:1.7;">${escapeHTML(p)}</p>`
        ).join('');

        const rating = d.overall_rating || 0;
        const totalReviews = d.total_reviews || 0;
        const stars = Math.round(rating);
        const starsHTML = Array.from({length:5},(_,i) =>
            `<i class="fa${i<stars?'s':'r'} fa-star" style="color:${i<stars?'var(--gold-star)':'#cbd5e1'};"></i>`
        ).join('');

        const reviewsHTML = (d.reviews || []).map(r => `
            <div class="review-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <strong style="color:var(--text-dark);">${escapeHTML(r.author || 'Anonymous')}</strong>
                    <span style="color:var(--gold-star); font-size:0.8rem;">${Array.from({length:5},(_,i) =>
                        `<i class="fa${i<(r.rating||5)?'s':'r'} fa-star"></i>`).join('')}</span>
                </div>
                <p style="color:var(--text-muted); font-style:italic;">"${escapeHTML(r.content || '')}"</p>
            </div>`).join('');

        const html = `
        <!-- HEADER -->
        <div class="soul-card" style="padding:28px;">
            <div class="profile-header">
                <div class="profile-avatar">${avatarContent}</div>
                <div>
                    <div class="profile-name">${escapeHTML(d.full_name)}</div>
                    <div class="profile-role">Peer Counselor</div>
                    <div class="verified-badge"><i class="fas fa-check-circle"></i> Verified Listener</div>
                </div>
            </div>
            ${d.availability_status ? `<div style="margin-top:16px;"><span class="avail-pill ${availClass}"><i class="fas ${availIcon}" style="font-size:0.5rem;"></i> ${escapeHTML(d.availability_status)}</span></div>` : ''}
        </div>

        <!-- ABOUT -->
        <div class="soul-card">
            <h2 class="section-title">Hello,</h2>
            ${d.bio_quote ? `<p style="margin-bottom:14px; color:var(--text-muted); font-style:italic; font-size:1.05rem; line-height:1.7;">"${escapeHTML(d.bio_quote)}"</p>` : ''}
            ${bioParagraphs || '<p style="color:var(--text-muted);">Bio coming soon.</p>'}
            ${expTags ? `<div class="exp-tags">${expTags}</div>` : ''}
        </div>

        <!-- REVIEWS -->
        <div class="soul-card">
            <div class="reviews-header">
                <h2 class="section-title" style="margin:0;">Reviews</h2>
                ${rating ? `<div style="color:var(--text-dark); font-weight:600; font-size:0.9rem;">
                    <i class="fas fa-star" style="color:var(--gold-star);"></i> ${rating.toFixed(1)}
                    <span style="font-weight:400; opacity:0.6;">(${totalReviews})</span>
                </div>` : ''}
            </div>
            ${starsHTML ? `<div style="margin-bottom:16px; font-size:0.95rem;">${starsHTML}</div>` : ''}

            <!-- WRITE REVIEW -->
            <div class="write-review-box">
                <h4 style="margin-bottom:14px; color:var(--text-dark);">Share your experience</h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
                    <input type="text" class="review-input" placeholder="Your name" style="margin:0;" id="rName">
                    <input type="email" class="review-input" placeholder="Email (kept private)" style="margin:0;">
                </div>
                <div class="star-rating" id="starInput">
                    ${Array.from({length:5},(_,i) => `<i class="far fa-star" onclick="rate(${i+1})"></i>`).join('')}
                </div>
                <textarea class="review-input" placeholder="Write your review..." rows="3" id="rMsg"></textarea>
                <div style="overflow:hidden;">
                    <button class="btn-publish" onclick="submitReview()">Publish Review</button>
                </div>
            </div>

            <!-- REVIEWS LIST -->
            <div id="reviewList">
                ${reviewsHTML || '<div style="opacity:0.4; font-size:0.88rem; padding:10px 0;">No reviews yet. Be the first!</div>'}
            </div>
        </div>

        <!-- BOUNDARY NOTE -->
        <div class="soul-card" style="background:transparent; box-shadow:none; border:none; padding:0; margin-bottom:80px;">
            <div class="boundary-note">
                <strong>A note on boundaries:</strong> I am here to listen and support, but I am not a medical professional. If you are experiencing a crisis, please reach out to iCall (9152987821) or emergency services.
            </div>
        </div>`;

        document.getElementById('loadingState').style.display = 'none';
        const content = document.getElementById('profileContent');
        content.innerHTML = html;
        content.style.display = 'block';

        // Attach FAB
        const fab = document.createElement('a');
        fab.href = '#'; fab.className = 'book-fab';
        fab.innerHTML = 'Connect Now <i class="fas fa-comment-dots"></i>';
        document.body.appendChild(fab);
    }

    function showError() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
    }

    // --- STAR RATING ---
    window.rate = function(n) {
        currentRating = n;
        document.querySelectorAll('#starInput i').forEach((s, i) => {
            s.className = i < n ? 'fas fa-star lit' : 'far fa-star';
            s.style.color = i < n ? 'var(--gold-star)' : '#cbd5e1';
        });
    };

    // --- SUBMIT REVIEW ---
    window.submitReview = async function() {
        const btn = document.querySelector('.btn-publish');
        const name = document.getElementById('rName')?.value.trim() || 'Anonymous';
        const msg = document.getElementById('rMsg')?.value.trim();

        if (!msg) { alert('Please share your experience.'); return; }
        if (!currentRating) { alert('Please select a star rating.'); return; }

        btn.textContent = 'Publishing...'; btn.disabled = true;

        try {
            const reviewData = {
                author: name,
                content: msg,
                rating: currentRating,
                date: new Date()
            };

            // Get current data to recalculate rating
            const snap = await getDoc(doc(db, 'peers', currentPeerId));
            const d = snap.data();
            const newTotal = (d.total_reviews || 0) + 1;
            const newRating = (((d.overall_rating || 0) * (d.total_reviews || 0)) + currentRating) / newTotal;

            await updateDoc(doc(db, 'peers', currentPeerId), {
                reviews: arrayUnion(reviewData),
                total_reviews: newTotal,
                overall_rating: Math.round(newRating * 10) / 10
            });

            // Add to DOM
            const list = document.getElementById('reviewList');
            const div = document.createElement('div');
            div.className = 'review-item';

            const header = document.createElement('div');
            header.style.cssText = 'display:flex; justify-content:space-between; margin-bottom:6px;';

            const nameEl = document.createElement('strong');
            nameEl.style.color = 'var(--text-dark)';
            nameEl.textContent = name;

            const starsEl = document.createElement('span');
            starsEl.style.cssText = 'color:var(--gold-star); font-size:0.8rem;';
            for (let i = 0; i < currentRating; i++) {
                const star = document.createElement('i'); star.className = 'fas fa-star'; starsEl.appendChild(star);
            }

            header.appendChild(nameEl); header.appendChild(starsEl);
            const msgEl = document.createElement('p');
            msgEl.style.cssText = 'color:var(--text-muted); font-style:italic;';
            msgEl.textContent = `"${msg}"`;

            div.appendChild(header); div.appendChild(msgEl);
            list.insertBefore(div, list.firstChild);

            btn.textContent = 'Published! ✓'; btn.style.background = '#22c55e';
            document.getElementById('rMsg').value = '';
            currentRating = 0;
            document.querySelectorAll('#starInput i').forEach(s => { s.className = 'far fa-star'; s.style.color = '#cbd5e1'; });

            setTimeout(() => { btn.textContent = 'Publish Review'; btn.style.background = ''; btn.disabled = false; }, 2500);

        } catch(e) {
            btn.textContent = 'Error. Try again.'; btn.disabled = false;
            console.error(e);
        }
    };

    loadProfile();
    window.addEventListener('load', () => {
        if (window.updateShellHeight) window.updateShellHeight();
    });
</script>
</body>
</html>
