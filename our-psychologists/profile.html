<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dynamic psychologist profile on Soulamore.">
    <title>Psychologist Profile | Soulamore</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        :root {
            --deep-space: #0f172a;
            --navy-glass: rgba(30, 41, 59, 0.7);
            --starlight: #f1f5f9;
            --teal-glow: #4ECDC4;
            --peach-glow: #F49F75;
            --alert-red: #ef4444;
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--deep-space);
            color: var(--starlight);
            line-height: 1.7;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Outfit', sans-serif;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 24px 100px;
            position: relative;
            z-index: 2;
        }

        .hidden {
            display: none;
        }

        .loader {
            text-align: center;
            padding: 120px 24px;
            opacity: 0.75;
        }

        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            opacity: 0.18;
            animation: float linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
            }

            to {
                transform: translateY(-10vh);
            }
        }

        .profile-nav {
            padding: 16px 0 24px;
        }

        .back-link {
            color: var(--starlight);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            opacity: 0.72;
            transition: 0.25s;
        }

        .back-link:hover {
            opacity: 1;
            color: var(--teal-glow);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0) 0%, rgba(30, 41, 59, 0.5) 100%);
            padding: 0 0 40px;
            border-bottom: 1px solid var(--border-glass);
            border-radius: 0 0 40px 40px;
        }

        .avatar-ring {
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--teal-glow), var(--peach-glow));
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            font-weight: 700;
        }

        .profile-name {
            font-size: 3rem;
            margin-bottom: 6px;
        }

        .profile-role {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--teal-glow);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .stat-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .stat-pill i {
            color: var(--peach-glow);
        }

        .book-btn {
            background: linear-gradient(135deg, var(--teal-glow), #2a9d8f);
            color: var(--deep-space);
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: 0.25s;
        }

        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 24px rgba(78, 205, 196, 0.35);
        }

        .profile-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 0 0 32px;
        }

        .profile-tab {
            border: 1px solid var(--border-glass);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(241, 245, 249, 0.82);
            border-radius: 999px;
            padding: 10px 18px;
            font: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .profile-tab.active,
        .profile-tab:hover {
            background: rgba(78, 205, 196, 0.14);
            color: var(--starlight);
            border-color: rgba(78, 205, 196, 0.4);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
            margin-bottom: 60px;
        }

        .glass-panel {
            background: var(--navy-glass);
            border: 1px solid var(--border-glass);
            padding: 34px;
            border-radius: 24px;
            margin-bottom: 24px;
        }

        .panel-title {
            font-size: 1.35rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title i {
            color: var(--teal-glow);
        }

        .panel-subtitle {
            font-size: 1.05rem;
            margin-bottom: 14px;
        }

        .section-intro,
        .bio-text,
        .notice-copy {
            opacity: 0.84;
            line-height: 1.8;
        }

        .bio-text {
            font-size: 1.06rem;
            margin-bottom: 18px;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid var(--border-glass);
        }

        .style-tag {
            border-color: rgba(244, 159, 117, 0.45);
            color: var(--peach-glow);
            background: rgba(244, 159, 117, 0.1);
        }

        .session-note {
            font-size: 1rem;
            padding: 15px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            font-style: italic;
            opacity: 0.82;
        }

        .credential-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .cred-icon {
            background: rgba(78, 205, 196, 0.1);
            color: var(--teal-glow);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .cred-details h4 {
            margin-bottom: 2px;
            font-size: 1rem;
        }

        .cred-details span {
            font-size: 0.88rem;
            opacity: 0.68;
            display: block;
        }

        .testi-box {
            background: linear-gradient(135deg, rgba(244, 159, 117, 0.1), rgba(0, 0, 0, 0));
            border: 1px solid rgba(244, 159, 117, 0.4);
            padding: 30px;
            border-radius: 20px;
            position: relative;
            margin-bottom: 18px;
        }

        .quote-icon {
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--deep-space);
            color: var(--peach-glow);
            padding: 0 10px;
            font-size: 1.5rem;
        }

        .quote-text {
            font-style: italic;
            opacity: 0.92;
            margin-bottom: 15px;
        }

        .quote-author {
            text-align: right;
            font-weight: 700;
            color: var(--peach-glow);
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-glass);
        }

        .info-list li:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.56;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 6px;
        }

        .info-val {
            font-size: 1rem;
            font-weight: 500;
        }

        .status-success {
            color: #4ade80;
        }

        .notice-alert {
            border-color: rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.08);
        }

        .notice-title {
            color: var(--alert-red);
            margin-bottom: 14px;
            font-size: 1.1rem;
        }

        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .profile-name {
                font-size: 2.2rem;
            }
        }
    </style>
    <link rel="icon" href="../assets/images/favicon_symbol.png" type="image/x-icon">
</head>

<body>
    <div id="particles"></div>

    <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> Loading profile...</div>
    <div id="error-msg" class="loader hidden" style="color:var(--alert-red);">Profile not found.</div>
    <div id="profile-content" class="container hidden"></div>

    <script type="module">
        import { resolvePsychologistProfile, mapPsychologistRecordToProfile } from "../assets/js/profile-catalog.js";
        import { mountPsychologistProfile } from "../assets/js/profile-renderers.js";
        import { getUserProfile } from "../assets/js/profile-handler.js";
        import { initBookingWidget } from "../assets/js/booking-widget.js";

        const params = new URLSearchParams(window.location.search);
        const key = params.get('slug') || params.get('id') || 'bhagyavathi';

        const root = document.getElementById('profile-content');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error-msg');

        async function init() {
            let profile = resolvePsychologistProfile(key);

            if (!profile && params.get('id')) {
                const record = await getUserProfile(params.get('id'));
                profile = mapPsychologistRecordToProfile(record, params.get('id'));
            }

            mountPsychologistProfile({ profile, root, loadingEl, errorEl });
        }

        init().catch((error) => {
            console.error(error);
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
        });

        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 28; i += 1) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.width = `${Math.random() * 3 + 1}px`;
            particle.style.height = particle.style.width;
            particle.style.animationDuration = `${Math.random() * 22 + 14}s`;
            particle.style.animationDelay = `${Math.random() * -20}s`;
            particleContainer.appendChild(particle);
        }
    </script>
</body>

</html>
