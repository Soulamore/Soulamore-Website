<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dynamic peer support profile on Soulamore.">
    <title>Peer Profile | Soulamore</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/global.css">

    <style>
        :root {
            --bg-color: #E6EFE8;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #5f6c7b;
            --accent-color: #7A9E7E;
            --accent-soft: #dbece0;
            --footer-bg: #182e2b;
        }

        body.theme-lonely {
            --bg-color: #F4E6DF;
            --accent-color: #C08B7A;
            --accent-soft: #ebdcd5;
            --footer-bg: #2e201e;
        }

        body.theme-low {
            --bg-color: #FFF8E1;
            --accent-color: #D4A373;
            --accent-soft: #faebd7;
            --footer-bg: #2e241b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            transition: background-color 0.8s ease;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        p {
            font-family: 'Lora', serif;
            font-size: 1.08rem;
            color: var(--text-muted);
        }

        .container {
            max-width: 840px;
            margin: 0 auto;
            padding: 0 24px 80px;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        .profile-nav {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: var(--accent-color);
        }

        .audio-pill {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.55);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: var(--text-main);
        }

        .loading-state {
            text-align: center;
            padding: 100px 0;
            opacity: 0.7;
        }

        .profile-hero {
            text-align: center;
            padding: 28px 0 50px;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: var(--card-bg);
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .avatar-initials {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--accent-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        .hero-name {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .hero-role {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .hero-quote {
            font-style: italic;
            font-size: 1.2rem;
            opacity: 0.82;
            margin-bottom: 20px;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .soft-badge {
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .soft-badge i {
            color: var(--accent-color);
            margin-right: 5px;
        }

        .profile-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .profile-tab {
            background: rgba(255, 255, 255, 0.56);
            border: 1px solid rgba(0, 0, 0, 0.06);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 10px 18px;
            font: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .profile-tab.active,
        .profile-tab:hover {
            background: var(--accent-soft);
            color: var(--text-main);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .soft-card {
            background: var(--card-bg);
            padding: 42px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .section-title {
            font-size: 1.35rem;
            margin-bottom: 20px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .check-list {
            list-style: none;
        }

        .check-list li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
        }

        .check-list li::before {
            content: '•';
            position: absolute;
            left: 10px;
            color: var(--accent-color);
            font-size: 1.5rem;
            line-height: 1rem;
            top: 5px;
        }

        .style-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .style-chip {
            padding: 8px 16px;
            background: var(--accent-soft);
            color: var(--text-main);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .review-card {
            background: #f8fafc;
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .review-copy {
            margin-bottom: 10px;
        }

        .review-author {
            font-size: 0.9rem;
            color: var(--accent-color);
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
        }

        .boundary-box {
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.4);
            text-align: center;
            margin-bottom: 24px;
        }

        .boundary-box h4 {
            margin-bottom: 10px;
        }

        .cta-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .primary-btn {
            background: var(--accent-color);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: 0.25s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            opacity: 0.92;
        }

        .cta-note {
            font-size: 0.92rem;
            margin-top: 15px;
            opacity: 0.72;
        }

        .save-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
            padding: 12px 30px;
            border-radius: 50px;
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .save-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: white;
        }

        @media (max-width: 600px) {
            .hero-name {
                font-size: 2rem;
            }

            .soft-card {
                padding: 30px 20px;
            }

            .profile-nav {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    <link rel="icon" href="../../assets/images/favicon_symbol.png" type="image/x-icon">
</head>

<body class="theme-anxiety">
    <div class="container">
        <div class="profile-nav">
            <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Peers</a>
            <button class="audio-pill" type="button" id="audioToggle"><i class="fas fa-music"></i> <span id="audioLabel">Play Ambience</span></button>
        </div>

        <audio id="profileAudio" loop>
            <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mp3">
        </audio>

        <div id="loadingState" class="loading-state">
            <i class="fas fa-circle-notch fa-spin" style="font-size:2rem; color:var(--accent-color);"></i>
            <p style="margin-top:20px;">Finding space...</p>
        </div>

        <div id="errorState" class="loading-state hidden">
            <p>Peer profile not found.</p>
        </div>

        <div id="profileContent" class="hidden"></div>
    </div>

    <script type="module">
        import { resolvePeerProfile } from "../../assets/js/profile-catalog.js";
        import { mountPeerProfile } from "../../assets/js/profile-renderers.js";

        const params = new URLSearchParams(window.location.search);
        const key = params.get('slug') || params.get('id') || 'aditya-mental-wellness';

        const root = document.getElementById('profileContent');
        const loadingEl = document.getElementById('loadingState');
        const errorEl = document.getElementById('errorState');
        const profile = resolvePeerProfile(key);

        mountPeerProfile({ profile, root, loadingEl, errorEl });

        const audio = document.getElementById('profileAudio');
        const toggle = document.getElementById('audioToggle');
        const label = document.getElementById('audioLabel');
        let playing = false;

        toggle.addEventListener('click', async () => {
            try {
                if (playing) {
                    audio.pause();
                    label.textContent = 'Play Ambience';
                } else {
                    audio.volume = 0.2;
                    await audio.play();
                    label.textContent = 'Pause Ambience';
                }
                playing = !playing;
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>

</html>
